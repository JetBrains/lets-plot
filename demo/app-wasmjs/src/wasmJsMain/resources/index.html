<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>app-wasmjs</title>
</head>
<body>
<main>
    <h2>Lets-Plot wasmJs</h2>
    <p>
        Demo:
        <a id="demo-simple-link" href="?demo=simple">MonolithicWasmJs</a>
        |
        <a id="demo-live-link" href="?demo=live">Live demo</a>
    </p>
    <p>Both demos are bundled into the same wasm/js application. No external Lets-Plot CDN script is used.</p>
    <p id="status"></p>

    <div id="controls" style="display: none;">
        <p><b>Live data</b></p>
        <p>
            <button id="toggle-button" type="button">Run</button>
            <button id="reset-button" type="button">Reset</button>
        </p>

        <fieldset>
            <legend>Distribution</legend>
            <label>
                <input id="distribution-normal" type="radio" name="distribution" value="normal" checked>
                Normal
            </label>
            <label>
                <input id="distribution-shifted" type="radio" name="distribution" value="shifted">
                Shifted
            </label>
            <label>
                <input id="distribution-bimodal" type="radio" name="distribution" value="bimodal">
                Bimodal
            </label>
            <label>
                <input id="distribution-uniform" type="radio" name="distribution" value="uniform">
                Uniform
            </label>
            <label>
                <input id="distribution-laplace" type="radio" name="distribution" value="laplace">
                Laplace
            </label>
        </fieldset>

        <p><b>View</b></p>
        <p>
            <label for="limits-checkbox">
                <input id="limits-checkbox" type="checkbox" checked>
                Lock axes
            </label>
        </p>
    </div>

    <hr>
    <section id="demo-root"></section>
</main>
<script src="demo-app-wasmjs.js"></script>
<script>
    const activeDemo = new URLSearchParams(window.location.search).get('demo') || 'simple';
    const activeLink = document.getElementById(
        activeDemo === 'simple' ? 'demo-simple-link' : 'demo-live-link'
    );
    if (activeLink) {
        activeLink.setAttribute('aria-current', 'page');
        activeLink.innerHTML = '<b>' + activeLink.textContent + '</b>';
    }
</script>
</body>
</html>
