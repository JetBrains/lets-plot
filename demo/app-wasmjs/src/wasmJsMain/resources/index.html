<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>app-wasmjs</title>
    <style>
        :root {
            --bg: #eef2f5;
            --panel: #ffffff;
            --text: #17212b;
            --muted: #4f5b66;
            --border: #d8dee4;
            --border-strong: #c7d0d9;
            --accent: #0f766e;
            --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 24px;
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, sans-serif;
        }

        .page {
            min-height: calc(100vh - 48px);
        }

        .title {
            margin: 0 0 8px;
        }

        .status {
            margin: 0 0 16px;
            color: var(--muted);
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 12px;
            margin-bottom: 16px;
        }

        .actions {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
        }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .button {
            padding: 10px 18px;
            border-radius: 999px;
            cursor: pointer;
            font: inherit;
        }

        .button-primary {
            border: none;
            background: var(--accent);
            color: white;
        }

        .button-secondary {
            border: 1px solid var(--border-strong);
            background: var(--panel);
            color: var(--text);
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border: 1px solid var(--border-strong);
            border-radius: 999px;
            background: var(--panel);
        }

        .pill input {
            font: inherit;
        }

        .pill-top {
            align-self: flex-end;
        }

        .option-panel {
            display: inline-grid;
            grid-template-columns: repeat(5, max-content);
            justify-items: center;
            align-items: center;
            gap: 8px;
            padding: 8px;
            border: 1px solid var(--border-strong);
            border-radius: 18px;
            background: var(--panel);
        }

        .option-panel-title {
            grid-column: 1 / -1;
            justify-self: center;
            padding: 0 6px 4px;
            color: var(--muted);
            font-size: 14px;
        }

        .option-chip {
            position: relative;
            cursor: pointer;
        }

        .option-chip input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .option-chip span {
            display: inline-flex;
            align-items: center;
            min-height: 36px;
            padding: 0 14px;
            border: 1px solid transparent;
            border-radius: 999px;
            color: var(--text);
            transition: background-color 120ms ease, border-color 120ms ease, color 120ms ease;
        }

        .option-chip input:checked + span {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .option-chip input:focus-visible + span {
            outline: 2px solid color-mix(in srgb, var(--accent) 55%, white);
            outline-offset: 2px;
        }

        #plot-host {
            display: block;
            width: min(960px, calc(100vw - 48px));
            height: min(70vh, 640px);
            min-width: 320px;
            min-height: 240px;
            background: var(--panel);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            overflow: hidden;
            resize: both;
        }
    </style>
</head>
<body>
<main class="page">
    <h2 class="title">app-wasmjs</h2>
    <p id="status" class="status"></p>

    <div class="controls">
        <div class="actions">
            <div class="action-buttons">
                <button id="toggle-button" class="button button-primary" type="button">Run</button>
                <button id="reset-button" class="button button-secondary" type="button">Reset</button>
            </div>
        </div>

        <div class="option-panel" aria-label="Distribution">
            <span class="option-panel-title">Distribution</span>

            <label class="option-chip">
                <input id="distribution-normal" type="radio" name="distribution" value="normal" checked>
                <span>Normal</span>
            </label>

            <label class="option-chip">
                <input id="distribution-shifted" type="radio" name="distribution" value="shifted">
                <span>Shifted Gaussian</span>
            </label>

            <label class="option-chip">
                <input id="distribution-bimodal" type="radio" name="distribution" value="bimodal">
                <span>Bimodal</span>
            </label>

            <label class="option-chip">
                <input id="distribution-uniform" type="radio" name="distribution" value="uniform">
                <span>Uniform</span>
            </label>

            <label class="option-chip">
                <input id="distribution-laplace" type="radio" name="distribution" value="laplace">
                <span>Laplace</span>
            </label>
        </div>

        <label class="pill pill-top" for="limits-checkbox">
            <input id="limits-checkbox" type="checkbox" checked>
            <span>Fixed axis limits</span>
        </label>
    </div>

    <div id="plot-host"></div>
</main>
<script src="demo-app-wasmjs.js"></script>
</body>
</html>
